<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <text x="700" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Lumen - high-level architecture (from codebase)</text>
  <text x="700" y="58" text-anchor="middle" font-size="12" fill="#64748b">Main path: POST /api/generate streams NDJSON via generateLessonStream()</text>

  <!-- Client -->
  <rect x="40" y="78" width="1320" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="102" font-size="11" font-weight="700" fill="#0f172a" letter-spacing="0.06em">BROWSER (NEXT.JS APP ROUTER)</text>
  <text x="56" y="122" font-size="12" fill="#334155">Pages: /, /studio, /lessons, /lesson/[lessonId]</text>
  <text x="56" y="142" font-size="12" fill="#334155">Client: VoiceSessionController, canvas editors, parseStreamEventLine() on NDJSON lines from /api/generate</text>
  <text x="56" y="162" font-size="11" fill="#64748b">Also calls: /api/voice/transcribe (multipart), /api/audio (TTS), /api/media (single asset), /api/openai (utility)</text>

  <!-- API bar -->
  <rect x="40" y="188" width="1320" height="48" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="56" y="212" font-size="11" font-weight="700" fill="#9a3412">ROUTE HANDLERS (src/app/api/)</text>
  <text x="56" y="230" font-size="11" fill="#c2410c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">generate</text>
  <text x="130" y="230" font-size="11" fill="#94a3b8">|</text>
  <text x="145" y="230" font-size="11" fill="#c2410c" font-family="ui-monospace, Menlo, monospace">voice/transcribe</text>
  <text x="280" y="230" font-size="11" fill="#94a3b8">|</text>
  <text x="295" y="230" font-size="11" fill="#c2410c" font-family="ui-monospace, Menlo, monospace">audio</text>
  <text x="350" y="230" font-size="11" fill="#94a3b8">|</text>
  <text x="365" y="230" font-size="11" fill="#c2410c" font-family="ui-monospace, Menlo, monospace">media</text>
  <text x="420" y="230" font-size="11" fill="#94a3b8">|</text>
  <text x="435" y="230" font-size="11" fill="#c2410c" font-family="ui-monospace, Menlo, monospace">openai</text>
  <text x="500" y="230" font-size="11" fill="#94a3b8">|</text>
  <text x="515" y="230" font-size="11" fill="#c2410c" font-family="ui-monospace, Menlo, monospace">lessons, lessons/[id], lessons/[id]/regenerate</text>

  <!-- Server core -->
  <rect x="40" y="252" width="420" height="200" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="278" font-size="11" font-weight="700" fill="#0f172a">ORCHESTRATOR</text>
  <text x="56" y="298" font-size="11" fill="#334155" font-family="ui-monospace, Menlo, monospace">lib/orchestrator/generate-lesson.ts</text>
  <text x="56" y="322" font-size="11" fill="#475569">- AsyncGenerator&lt;StreamEvent&gt;</text>
  <text x="56" y="342" font-size="11" fill="#475569">- createGeneratingLesson + createGenerationRun (DB)</text>
  <text x="56" y="362" font-size="11" fill="#475569">- createEmptyLesson + applyLessonPatch</text>
  <text x="56" y="382" font-size="11" fill="#475569">- createSandboxedLessonArtifact + saveLessonVersion</text>
  <text x="56" y="402" font-size="11" fill="#475569">- finishGenerationRun / markLessonFailed</text>
  <text x="56" y="430" font-size="10" fill="#64748b">StreamEvent: run_started, provider_*, lesson_patch,</text>
  <text x="56" y="446" font-size="10" fill="#64748b">lesson_snapshot, run_completed, run_failed</text>

  <!-- Pipeline steps -->
  <text x="490" y="278" font-size="11" font-weight="700" fill="#0f172a">PIPELINE ORDER (same process, sequential unless noted)</text>

  <g font-size="9.5" fill="#1e293b">
    <rect x="490" y="288" width="118" height="56" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="549" y="310" text-anchor="middle" font-weight="600">1 SLNG</text>
    <text x="549" y="326" text-anchor="middle">intake hint</text>
    <text x="549" y="338" text-anchor="middle" fill="#64748b">slng.ts</text>

    <rect x="618" y="288" width="118" height="56" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="677" y="310" text-anchor="middle" font-weight="600">2 Tavily</text>
    <text x="677" y="326" text-anchor="middle">2 queries, merge</text>
    <text x="677" y="338" text-anchor="middle" fill="#64748b">tavily.ts</text>

    <rect x="746" y="288" width="118" height="56" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="805" y="310" text-anchor="middle" font-weight="600">3 Pioneer</text>
    <text x="805" y="326" text-anchor="middle">extract / heuristic</text>
    <text x="805" y="338" text-anchor="middle" fill="#64748b">pioneer.ts</text>

    <rect x="874" y="288" width="118" height="56" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="933" y="310" text-anchor="middle" font-weight="600">4 OpenAI</text>
    <text x="933" y="326" text-anchor="middle">generateLessonPlan</text>
    <text x="933" y="338" text-anchor="middle" fill="#64748b">llm.ts + AI SDK</text>

    <rect x="1002" y="288" width="150" height="56" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.2"/>
    <text x="1077" y="308" text-anchor="middle" font-weight="600">5 Patches</text>
    <text x="1077" y="322" text-anchor="middle">each patch -> NDJSON</text>
    <text x="1077" y="336" text-anchor="middle" fill="#047857">lesson_patch + snapshot</text>

    <rect x="1168" y="288" width="172" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="1254" y="308" text-anchor="middle" font-weight="600">6 fal</text>
    <text x="1254" y="322" text-anchor="middle">Promise.all media</text>
    <text x="1254" y="336" text-anchor="middle" fill="#b45309">fal.ts + S3 mirror</text>
  </g>

  <path d="M608 316 L618 316" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M736 316 L746 316" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M864 316 L874 316" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M992 316 L1002 316" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1152 316 L1168 316" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="352" font-size="9" fill="#64748b" font-style="italic">then (same generator):</text>
  <g font-size="9.5" fill="#1e293b">
    <rect x="490" y="358" width="140" height="56" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="560" y="380" text-anchor="middle" font-weight="600">7 SLNG TTS</text>
    <text x="560" y="396" text-anchor="middle">narration audio node</text>
    <text x="560" y="408" text-anchor="middle" fill="#64748b">slng.ts + S3 bytes</text>

    <rect x="642" y="358" width="150" height="56" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="717" y="380" text-anchor="middle" font-weight="600">8 OpenAI</text>
    <text x="717" y="396" text-anchor="middle">generateLessonRuntimeScript</text>
    <text x="717" y="408" text-anchor="middle" fill="#64748b">inline lesson JS</text>

    <rect x="804" y="358" width="200" height="56" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.2"/>
    <text x="904" y="380" text-anchor="middle" font-weight="600">9 Persist</text>
    <text x="904" y="396" text-anchor="middle">html-artifact + saveLessonVersion</text>
    <text x="904" y="408" text-anchor="middle" fill="#047857">studio-state + run_completed</text>
  </g>

  <path d="M630 386 L642 386" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M792 386 L804 386" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="490" y="432" font-size="10" fill="#475569">After step 2: set_citations on LessonDocument. After step 6-7: replace_node patches for media/audio. Step 8 may skip LLM if transcript contains "solar system" (bundled runtime).</text>

  <!-- Lib row -->
  <rect x="490" y="448" width="870" height="52" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="506" y="472" font-size="10" font-weight="600" fill="#334155">SHARED LIB</text>
  <text x="506" y="490" font-size="10" fill="#475569" font-family="ui-monospace, Menlo, monospace">lib/lesson/schema.ts, patches.ts, repository.ts, studio-state.ts, html-artifact.ts</text>
  <text x="506" y="504" font-size="10" fill="#475569" font-family="ui-monospace, Menlo, monospace">lib/media/s3-storage.ts, lib/env.ts (Zod), lib/url.ts</text>

  <!-- Data layer -->
  <rect x="40" y="518" width="640" height="100" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="544" font-size="11" font-weight="700" fill="#0369a1">POSTGRESQL + DRIZZLE</text>
  <text x="56" y="564" font-size="11" fill="#334155" font-family="ui-monospace, Menlo, monospace">src/db/schema.ts</text>
  <text x="56" y="584" font-size="11" fill="#475569">tables: lessons, lesson_versions, generation_runs</text>
  <text x="56" y="604" font-size="11" fill="#475569">getDb() via postgres driver - DATABASE_URL required</text>

  <rect x="700" y="518" width="660" height="100" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="716" y="544" font-size="11" font-weight="700" fill="#6b21a8">S3 (OPTIONAL)</text>
  <text x="716" y="564" font-size="11" fill="#475569">mirrorRemoteAssetToS3 (fal URLs), uploadGeneratedBytesToS3 (TTS)</text>
  <text x="716" y="584" font-size="11" fill="#64748b">Env: S3_BUCKET, AWS_*, S3_PUBLIC_BASE_URL, ...</text>

  <!-- Legend -->
  <rect x="40" y="636" width="1320" height="72" rx="8" fill="#0f172a"/>
  <text x="56" y="662" font-size="11" font-weight="600" fill="#f8fafc">LEGEND</text>
  <text x="56" y="682" font-size="10" fill="#cbd5e1">Green boxes: high-volume NDJSON to client (lesson_patch / lesson_snapshot).</text>
  <text x="56" y="698" font-size="10" fill="#94a3b8">Orange: streaming entrypoint POST /api/generate (Content-Type: application/x-ndjson; maxDuration 120s on route).</text>

  <text x="700" y="758" text-anchor="middle" font-size="10" fill="#64748b">See lib/orchestrator/generate-lesson.ts and docs/PROJECT.md for full detail.</text>
</svg>
